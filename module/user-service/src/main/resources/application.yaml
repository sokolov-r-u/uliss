server:
  port: ${USER_SERVER_PORT:8080}

spring:
  application:
    name: user-service
  config:
    import:
      - classpath:database.yml
      - classpath:exception.yml
      - classpath:security.yml
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL}?currentSchema=profile
  flyway:
    schemas: profile
    default-schema: profile

