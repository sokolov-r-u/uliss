<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Sign in · Uliss')}"></head>
<body th:replace="~{fragments/layout :: page('signin', ~{::content})}">
  <form th:fragment="content" method="post" th:action="@{/login}" class="auth-body" novalidate>
    <p class="greek">χαῖρε · <span>welcome back</span></p>
    <h1 class="auth-heading">Return to your sky</h1>

    <div class="auth-note auth-note--ok" th:if="${param.registered}">
      Account created. Sign in below.
    </div>
    <div class="auth-note" th:if="${param.logout}">
      You have signed out.
    </div>
    <div class="auth-note auth-note--err" th:if="${param.error}">
      Wrong email or passphrase.
    </div>

    <div class="field">
      <label class="kicker" for="username">Email</label>
      <div class="field-box">
        <input id="username" name="username" type="email" autocomplete="email"
               placeholder="wayfarer@uliss.app" required autofocus/>
      </div>
    </div>

    <div class="field">
      <label class="kicker" for="password">Passphrase</label>
      <div class="field-box">
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="your passphrase" required/>
        <button type="button" class="eye" data-toggle="password" aria-label="Show passphrase">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-aux">
      <span class="muted" title="Coming soon">Forgot passphrase?</span>
    </div>

    <button type="submit" class="auth-button">Enter</button>

    <div class="divider"><span></span><em class="kicker">or</em><span></span></div>

    <button type="button" class="sso" disabled title="Coming soon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="square"><path d="M4 6h16v12H4zM4 7l8 6 8-6"/></svg>
      Email me a sign-in link
    </button>
  </form>
</body>
</html>
