<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <title th:text="${title}">Uliss</title>
  <link rel="stylesheet" th:href="@{/ds/styles.css}"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg-deep);
      color: var(--cream);
      font-family: var(--font-mono);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Stage ─────────────────────────────────────────── */
    .auth-stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      overflow: hidden;
    }
    .auth-stage::before {           /* warm top glow */
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(120% 90% at 50% 0%, rgba(200,100,60,.06), rgba(14,10,7,0) 60%);
      pointer-events: none;
    }
    .auth-stage::after {            /* ceramic craquelure */
      content: "";
      position: absolute; inset: 0;
      background-image: var(--texture-craquelure);
      background-size: 300px;
      mix-blend-mode: overlay;
      opacity: .5;
      pointer-events: none;
    }

    /* ── Window ────────────────────────────────────────── */
    .auth-window {
      position: relative;
      z-index: 1;
      width: min(1000px, 100%);
      display: flex;
      background: var(--bg);
      border: var(--border-strong);
      box-shadow: 0 30px 80px -20px rgba(0,0,0,.7);
      animation: auth-rise .7s cubic-bezier(.2,.7,.2,1) both;
    }
    @keyframes auth-rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Brand panel ───────────────────────────────────── */
    .brand {
      position: relative;
      flex: 0 0 432px;
      background: var(--bg-deep);
      border-right: var(--border-strong);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 46px 44px;
    }
    .brand .orion-layer {
      position: absolute; inset: 0;
      padding: 40px 24px;
      pointer-events: none;
    }
    .brand .orion-layer svg { width: 100%; height: 100%; opacity: .85; }
    .brand .meander {
      position: absolute; top: 0; right: 0;
      width: 14px; height: 100%;
      background-image: var(--meander-v);
      background-repeat: repeat-y;
      background-size: 14px auto;
      opacity: .3;
    }
    .brand-head { position: relative; }
    .brand-quote {
      position: relative;
      flex: 1;
      display: flex;
      align-items: flex-end;
    }
    .brand-quote p {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: .8px;
      color: var(--cream);
      text-align: center;
      text-wrap: balance;
      margin: 0;
    }

    /* ── Wordmark / kicker ─────────────────────────────── */
    .wordmark {
      display: inline-block;
      font-family: var(--font-display);
      line-height: .9;
      letter-spacing: .02em;
      color: transparent;
      background: var(--gradient-wordmark);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .brand .wordmark { font-size: 64px; }
    .kicker {
      display: inline-block;
      font-family: var(--font-mono);
      font-weight: var(--weight-medium);
      text-transform: uppercase;
      color: var(--cream-dim);
    }
    .brand-kicker { margin-top: 12px; font-size: 9.5px; letter-spacing: 3px; }

    /* ── Form panel ────────────────────────────────────── */
    .form-panel {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      padding: 50px 56px;
    }
    .form-inner { width: 100%; max-width: 344px; }

    .auth-tabs {
      display: flex;
      border: var(--border-strong);
      margin-bottom: 28px;
    }
    .auth-tabs a {
      flex: 1;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid transparent;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-muted);
      transition: color .2s, background .2s;
    }
    .auth-tabs a:hover { color: var(--cream-dim); }
    .auth-tabs a.is-active {
      border-bottom-color: var(--ochre);
      background: var(--bg-surface);
      color: var(--cream);
      font-weight: var(--weight-medium);
    }

    /* ── Form body ─────────────────────────────────────── */
    .auth-body { display: flex; flex-direction: column; }
    .greek {
      margin: 0;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 15px;
      letter-spacing: .5px;
      color: var(--ochre);
    }
    .greek span { color: var(--cream-dim); }
    .auth-heading {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 27px;
      line-height: 1.15;
      color: var(--cream);
      text-wrap: balance;
      margin: 7px 0 22px;
    }

    .field { margin-bottom: 15px; }
    .field > .kicker {
      display: block;
      margin-bottom: 7px;
      font-size: 8.5px;
      letter-spacing: 2px;
      color: var(--text-muted);
    }
    .field-box {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 46px;
      padding: 0 14px;
      background: var(--bg-panel);
      border: 1px solid var(--line-strong);
      transition: border-color .2s, box-shadow .2s;
    }
    .field-box:focus-within {
      border-color: var(--ochre);
      box-shadow: var(--glow-ochre);
    }
    .field-box input {
      flex: 1;
      min-width: 0;
      height: 100%;
      border: 0;
      background: transparent;
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: .5px;
    }
    .field-box input::placeholder { color: var(--text-faint); }
    .field-box input:focus { outline: none; }
    .field-box.has-error { border-color: var(--terracotta); }
    .field-error {
      margin: 6px 0 0;
      font-size: 10px;
      letter-spacing: .3px;
      color: var(--terracotta);
    }
    .eye {
      display: flex;
      flex-shrink: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
    }
    .eye:hover { color: var(--cream-dim); }

    .field-aux {
      display: flex;
      justify-content: flex-end;
      margin: 2px 0 18px;
    }
    .field-aux .muted {
      font-size: 10px;
      letter-spacing: .5px;
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .auth-button {
      width: 100%;
      height: 50px;
      margin-top: 4px;
      border: 1px solid rgba(240,192,106,.5);
      background: linear-gradient(160deg, var(--ochre-bright), var(--ochre) 75%, var(--terracotta-deep));
      color: var(--bg-deep);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: var(--weight-bold);
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 26px -6px rgba(217,154,78,.55);
      transition: filter .2s, transform .05s;
    }
    .auth-button:hover { filter: brightness(1.07); }
    .auth-button:active { transform: translateY(1px); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 17px 0;
    }
    .divider span { flex: 1; height: 1px; background: var(--line); }
    .divider .kicker { font-size: 8.5px; letter-spacing: 2px; color: var(--text-faint); }

    .sso {
      width: 100%;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--cream-dim);
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: not-allowed;
      opacity: .55;
    }

    .auth-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 18px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .5px;
    }
    .auth-footer .pre { color: var(--text-faint); }
    .auth-footer a {
      color: var(--ochre-bright);
      border-bottom: 1px solid var(--ochre);
      padding-bottom: 1px;
      text-decoration: none;
    }
    .auth-footer a:hover { color: var(--cream); }

    /* ── Notices ───────────────────────────────────────── */
    .auth-note {
      margin: 0 0 16px;
      padding: 10px 12px;
      border-left: 2px solid var(--line-strong);
      background: var(--bg-panel);
      font-size: 11px;
      letter-spacing: .3px;
      color: var(--cream-dim);
    }
    .auth-note--ok  { border-left-color: var(--ochre); }
    .auth-note--err { border-left-color: var(--terracotta); color: var(--cream); }

    /* ── Twinkle (Orion) ───────────────────────────────── */
    .orion .tw   { animation-name: uTwk;  animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
    .orion .tw-f { animation-name: uTwkF; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
    @keyframes uTwk  { 0%,100% { opacity:.45 } 50% { opacity:1 } }
    @keyframes uTwkF { 0%,100% { opacity:.2 }  50% { opacity:.7 } }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 860px) {
      .auth-window { flex-direction: column; width: min(440px, 100%); }
      .brand { flex: 0 0 auto; padding: 36px 32px 30px; }
      .brand .orion-layer { display: none; }
      .brand .meander { width: 100%; height: 14px; top: auto; bottom: 0; background-size: auto 14px; background-repeat: repeat-x; }
      .brand .wordmark { font-size: 48px; }
      .brand-quote { display: none; }
      .form-panel { padding: 36px 32px 40px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .auth-window { animation: none; }
      .orion .tw, .orion .tw-f { animation: none; }
    }
  </style>
</head>
<body>
<!--/* Shared auth shell. active = 'signin' | 'register'; content = the <form> fragment. */-->
<div th:fragment="page(active, content)" class="auth-stage">
  <main class="auth-window">
    <aside class="brand">
      <div class="orion-layer" th:replace="~{fragments/orion :: orion}"></div>
      <div class="meander"></div>
      <div class="brand-head">
        <span class="wordmark">Uliss</span>
        <div class="brand-kicker kicker">Voice journal</div>
      </div>
      <div class="brand-quote">
        <p>Speak a thought. Watch it find its place among the stars.</p>
      </div>
    </aside>

    <section class="form-panel">
      <div class="form-inner">
        <nav class="auth-tabs">
          <a th:href="@{/login}"    th:classappend="${active == 'signin'}   ? 'is-active'">Sign in</a>
          <a th:href="@{/register}" th:classappend="${active == 'register'} ? 'is-active'">Register</a>
        </nav>

        <div th:replace="${content}">form goes here</div>

        <div class="auth-footer" th:if="${active == 'signin'}">
          <span class="pre">New here?</span>
          <a th:href="@{/register}">Create an account</a>
        </div>
        <div class="auth-footer" th:if="${active == 'register'}">
          <span class="pre">Already a wayfarer?</span>
          <a th:href="@{/login}">Sign in</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll('.eye[data-toggle]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(btn.getAttribute('data-toggle'));
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });
  </script>
</body>
</html>
