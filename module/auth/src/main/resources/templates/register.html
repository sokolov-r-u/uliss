<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Register · Uliss')}"></head>
<body th:replace="~{fragments/layout :: page('register', ~{::content})}">
  <form th:fragment="content" method="post" th:action="@{/register}" th:object="${registerForm}"
        class="auth-body" novalidate>
    <p class="greek">ἀρχή · <span>begin</span></p>
    <h1 class="auth-heading">Trace your first star</h1>

    <div class="auth-note auth-note--err" th:if="${#fields.hasAnyErrors()}">
      Please fix the highlighted fields.
    </div>

    <div class="field">
      <label class="kicker" for="email">Email</label>
      <div class="field-box" th:classappend="${#fields.hasErrors('email')} ? 'has-error'">
        <input id="email" type="email" th:field="*{email}" autocomplete="email"
               placeholder="you@uliss.app" required autofocus/>
      </div>
      <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</p>
    </div>

    <div class="field">
      <label class="kicker" for="reg-password">Passphrase</label>
      <div class="field-box" th:classappend="${#fields.hasErrors('password')} ? 'has-error'">
        <input id="reg-password" type="password" th:field="*{password}" autocomplete="new-password"
               placeholder="choose a passphrase" required/>
        <button type="button" class="eye" data-toggle="reg-password" aria-label="Show passphrase">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</p>
    </div>

    <div style="height: 4px"></div>
    <button type="submit" class="auth-button">Begin</button>

    <div class="divider"><span></span><em class="kicker">or</em><span></span></div>

    <button type="button" class="sso" disabled title="Coming soon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="square"><path d="M4 6h16v12H4zM4 7l8 6 8-6"/></svg>
      Email me a sign-in link
    </button>
  </form>
</body>
</html>
