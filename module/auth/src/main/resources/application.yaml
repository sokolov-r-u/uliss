server:
  port: 9000

spring:
  application:
    name: auth
  config:
    import:
      - classpath:database.yml
      - classpath:exception.yml
  security:
    user:
      name: user
      password: password
    oauth2:
      authorizationserver:
        client:
          oidc-client:
            registration:
              client-id: "oidc-client"
              client-secret: "{noop}secret"
              client-authentication-methods:
                - "client_secret_basic"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
              redirect-uris:
                - "http://127.0.0.1:8080/login/oauth2/code/oidc-client"
              post-logout-redirect-uris:
                - "http://127.0.0.1:8080/"
              scopes:
                - "openid"
                - "profile"
            require-authorization-consent: true
        issuer: http://auth-server:9000
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL}?currentSchema=auth
  flyway:
    schemas: auth
    default-schema: auth
  jpa:
    properties:
      hibernate:
        default_schema: auth

app:
  auth:
    issuer: ${AUTH_SERVER_ISSUER}
  clients:
    spa:
      client-id: ${APP_CLIENTS_SPA_CLIENT_ID}
      redirect-uri: ${APP_CLIENTS_SPA_REDIRECT_URI}

    m2m:
      client-id: ${APP_CLIENTS_M2M_CLIENT_ID}
      client-secret: ${APP_CLIENTS_M2M_CLIENT_SECRET}