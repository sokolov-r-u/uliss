server:
  port: ${AUTH_SERVER_PORT:9000}

spring:
  application:
    name: auth
  config:
    # noinspection SpringBootApplicationYaml
    import:
      - classpath:database.yml
      - classpath:exception.yml
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${POSTGRES_URL}?currentSchema=auth
  flyway:
    schemas: auth
    default-schema: auth
  jpa:
    properties:
      hibernate:
        default_schema: auth
  thymeleaf:
    cache: false   #todo dev: always re-render templates; enable in prod

app:
  auth:
    issuer: ${AUTH_SERVER_ISSUER}
  cors:
    allowed-origins: ${AUTH_ALLOWED_CORS_URLS:http://localhost:3000}
  clients:
    spa:
      client-id: ${APP_CLIENTS_SPA_CLIENT_ID}
      redirect-uri: ${APP_CLIENTS_SPA_REDIRECT_URI}

    m2m:
      client-id: ${APP_CLIENTS_M2M_CLIENT_ID}
      client-secret: ${APP_CLIENTS_M2M_CLIENT_SECRET}